name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm@8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build web
        run: pnpm build
      
      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visionsub-web
          path: dist/

  create-release:
    needs: build-web
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: visionsub-web
          path: artifacts/
      
      - name: Create zip
        run: |
          cd artifacts
          zip -r ../visionsub-web.zip .
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          name: VisionSub ${{ github.ref_name }}
          body: |
            ## VisionSub ${{ github.ref_name }}
            
            Web build - extract and run with any HTTP server.
            
            See CHANGELOG for details.
          files: visionsub-web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
